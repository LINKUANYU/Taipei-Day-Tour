services:
  # 第一個服務：FastAPI 後端
  api:
    build: .
    container_name: fastapi_backend
    restart: always
    # 讀取你的環境變數檔 (例如資料庫密碼)
    env_file:
      - .env
    # 注意：這裡我們「不」開放 ports 給外部，因為它被 Nginx 擋在後面保護著
    
    # 把主機的 static 對應到容器內的 static
    volumes:
      - ./static:/app/static

  # 第二個服務：Nginx 代理伺服器
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      # 把 EC2 主機的 80 Port，接通到 Nginx 容器的 80 Port
      - "80:80"
    depends_on:
      - api
    volumes:
      # 把剛剛寫好的設定檔，掛載進 Nginx 裡面替換掉預設設定
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 【關鍵】把主機上的 static 資料夾，掛載給 Nginx，這樣 Nginx 才能抓到靜態圖片和 HTML
      - ./static:/app/static:ro