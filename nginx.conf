server {
    # 監聽 80 Port (接收來自 Cloudflare 的連線)
    listen 80;
    server_name _;

    # 1. 處理靜態檔案 (Nginx 親自處理，速度最快！)
    location /static/ {
        # 對應到容器內的 /app/static/ 目錄
        alias /app/static/;
        # 設定快取時間，讓瀏覽器暫存圖片/CSS，減輕伺服器負擔
        expires 30d;
    }

    # 2. 處理其他所有請求 (轉交給 FastAPI)
    location / {
        # 'api' 是我們在 docker-compose 裡面幫 FastAPI 取的名字
        proxy_pass http://api:8000;
        
        # 把使用者的真實 IP 傳遞給 FastAPI (否則 FastAPI 會以為所有請求都來自 Nginx)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}